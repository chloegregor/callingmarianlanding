<!DOCTYPE html>
<html lang="en" class="h-full w-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="canonical" href="https://callingmarian.com/">
    <meta name="description" content="Calling Marian – techno, acid &amp; electronic music producer and live performer. discover her music on Spotify, Bandcamp &amp; YouTube.">
    <link rel="stylesheet" href="style.css">
    <meta name="google" content="notranslate">
    <meta name="robots" content="index, follow">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="favicon.ico">
    <title>Calling Marian – Techno & Acid Music Producer | Official Website</title>
  </head>
      <body class="h-full w-full bg-black">
        <main class="fond relative pt-10 flex flex-col">
          <div class="flex-1 ">
            <img src="images/logo.webp" alt="logo" class=" logo lg:h-[70px] md:h-[70px] h-auto max-w-[80%] ">
            <div class=" flex lg:flex-row  lanscape:flex-row flex-col items-center lg:items-start lg:justify-between  mt-[100px] lg:mt-[0px]">
              <div class="flex w-[400px] mb-[1em] justify-center lg:order-1 order-2">
                <div class="flex flex-col " >
                  <button id="socialToggle" class="text-white text-[1.3em] lg:hover:text-[#ff4400] ">social medias</button>
                  <div id="socialDrawer" class=" drawer flex gap-5 mt-2">
                    <a href="https://www.instagram.com/callingmarian/" target="_blank">
                      <img src="images/insta.svg" alt="Instagram" class="h-[20px]">
                    </a>
                    <a href="https://www.youtube.com/@CallingMarianMusic" target="_blank">
                      <img src="images/yt.svg" alt="Youtube" class="h-[20px]">
                    </a>
                    <a href="https://cvntrecords.bandcamp.com/" target="_blank">
                      <img src="images/bc.svg" alt="Bandcamp" class="h-[20px]">
                    </a>
                    <a href="https://open.spotify.com/intl-fr/artist/5464tjCwWXfpv8foCwWD54" target="_blank">
                      <img src="images/spot.svg" alt="Spotify" class="h-[20px]">
                    </a>
                    <a href="https://www.bandsintown.com/fr?came_from=257" target="_blank">
                      <img src="images/bit.svg" alt="Bandsintown" class="h-[20px]">
                    </a>
                  </div>
                </div>
              </div>
              <div class=" flex w-[400px] min-h-[50px] items-center justify-center relative lg:order-2 order-1">
                <div class=" flex flex-col gap-3 items-center lg:absolute lg:-bottom-[250px] mb-[20px] relative">
                  <button id="play" class=" cursor-pointer flex flex-col">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="30">
                      <path d="M2 1 L9 5 L2 9 Z" />
                    </svg>
                  </button>
                  <div id="player" class="drawer  lg:absolute top-[50px] lg:w-[400px]">
                    <iframe style="border: 0; width: 100%; height: 42px;" src="https://bandcamp.com/EmbeddedPlayer/album=1901782208/size=small/bgcol=ffffff/linkcol=333333/artwork=none/transparent=true/" seamless><a href="https://cvntrecords.bandcamp.com/album/lost-in-the-datacenter-ep">Lost In The Datacenter - EP de Calling Marian</a></iframe>
                  </div>
                </div>
              </div>
              <div class=" flex w-[400px] justify-center  order-3">
                <div class="flex flex-col ">
                  <button id="contactsToggle" class="text-white text-[1.3em] lg:hover:text-[#ff4400]">contacts</button>
                  <div id="contactsDrawer" class="drawer flex flex-col gap-2 text-[0.8em] mt-2 items-center">
                    <div id="general" class="flex gap-2 text-white">
                      <p >general inquiries</p>
                    </div>
                    <div id="booking" class="flex gap-2 text-white">
                      <p >booking</p>
                    </div>
                    <div id="publish" class="flex gap-2 text-white">
                      <p >publishing</p>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          </div>
          <div class="w-full text-justify p-1">
            <h1 class ="text-[0.5em]">
              Calling Marian
          </h1>
          <h2 class ="text-[0.5em]">French electronic acid transe techno music producer EP "Lost In The Datacenter" – listen on <a href="https://cvntrecords.bandcamp.com/" target="_blank">Bandcamp</a>, <a href="https://open.spotify.com/intl-fr/artist/5464tjCwWXfpv8foCwWD54" target="_blank">Spotify</a>, <a href="https://www.youtube.com/@CallingMarianMusic" target="_blank">YouTube</a></h2>
          <p class ="text-[0.5em]">Performing live DJ sets across France and Europe, releasing acid techno tracks and electronic music productions.</p>
          </div>
        </main>
        <footer>
      </footer>
      <script>
        const toggleSocials = document.getElementById('socialToggle');
        const drawerSocials = document.getElementById('socialDrawer');
        const toggleContacts = document.getElementById('contactsToggle');
        const drawerContacts = document.getElementById('contactsDrawer');
        const play = document.getElementById('play')
        const player = document.getElementById('player')

      toggleSocials.addEventListener('click', () => {
        drawerSocials.classList.toggle('open');

        if (drawerSocials.classList.contains('open')) {
          toggleSocials.classList.add('text-[#ff4400]');
        } else {
          toggleSocials.classList.remove('text-[#ff4400]');
        }
      });

      toggleContacts.addEventListener('click', () => {
        drawerContacts.classList.toggle('open');
        if (drawerContacts.classList.contains('open')) {
          toggleContacts.classList.add('text-[#ff4400]');
        } else {
          toggleContacts.classList.remove('text-[#ff4400]');
        }
      });

      play.addEventListener('click', () => {
        player.classList.toggle('open');

        play.classList.toggle('active');
      });

        const emails = [
        {id: "general", user: "callingmarian", domain: "ikmail.com"},
        {id: "booking", user: "aurore.voisin", domain: "wspectacle.com"},
        {id: "publish", user: "catherine.cuny", domain: "publishing.wagram.fr"}
        ];

        emails.forEach(e => {
          const container = document.getElementById(e.id);
          const p = document.createElement("p");
          p.textContent = `${e.user}@${e.domain}`;
          container.appendChild(p);
          p.classList.add('regular')
        });



      </script>
    </body>
</html>
